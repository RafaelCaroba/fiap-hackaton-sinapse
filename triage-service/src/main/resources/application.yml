server:
  port: 8082

spring:

  application:
    name: triage-service

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:sinapse}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:

    hibernate:
      ddl-auto: update

    properties:

      hibernate:
        default_schema: triage
        format_sql: true

    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    br.com.sinapse.triage: INFO

patient-service:
  url: ${PATIENT_SERVICE_URL:http://localhost:8081}
  connect-timeout-ms: 3000
  read-timeout-ms: 5000

triage-event:
  exchange: ${TRIAGE_EVENT_EXCHANGE:triage.exchange}
  routing-key: ${TRIAGE_EVENT_ROUTING_KEY:triage.completed}
